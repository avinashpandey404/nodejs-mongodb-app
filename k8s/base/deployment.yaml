apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  namespace: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          image: your-dockerhub/node-app:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: node-config
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
